<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KISS FM</title>
    <meta name="description" content="KISS FM — Non-Stop Kiss Dance">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #FF2D95;
            --pink-light: #FF5CAF;
            --pink-dim: rgba(255, 45, 149, 0.35);
            --cyan: #00E5FF;
            --cyan-dim: rgba(0, 229, 255, 0.25);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.13);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.4);
        }

        html, body {
            height: 100%;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            overflow: hidden;
        }

        body {
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(100, 40, 200, 0.7) 0%, transparent 60%),
                radial-gradient(ellipse 70% 50% at 80% 20%, rgba(30, 60, 220, 0.8) 0%, transparent 55%),
                radial-gradient(ellipse 60% 80% at 60% 60%, rgba(180, 50, 220, 0.5) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 10% 20%, rgba(60, 20, 180, 0.6) 0%, transparent 50%),
                linear-gradient(160deg, #0c0024 0%, #1a0040 30%, #0d0030 60%, #06001a 100%);
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(
                170deg,
                rgba(10, 0, 30, 0.3) 0%,
                rgba(10, 0, 20, 0.1) 40%,
                rgba(10, 0, 30, 0.35) 100%
            );
            pointer-events: none;
        }

        /* Ambient glow blobs */
        .glow {
            position: fixed;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .glow--pink {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 45, 149, 0.4) 0%, transparent 70%);
            top: -15%;
            right: -10%;
            filter: blur(60px);
            animation: glowDrift1 10s ease-in-out infinite alternate;
        }

        .glow--cyan {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.35) 0%, transparent 70%);
            bottom: -15%;
            left: -10%;
            filter: blur(60px);
            animation: glowDrift2 12s ease-in-out infinite alternate;
        }

        .glow--purple {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(140, 50, 255, 0.25) 0%, transparent 65%);
            top: 30%;
            left: 20%;
            filter: blur(80px);
            animation: glowDrift3 14s ease-in-out infinite alternate;
        }

        @keyframes glowDrift1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-40px, 30px) scale(1.15); }
        }

        @keyframes glowDrift2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(35px, -25px) scale(1.1); }
        }

        @keyframes glowDrift3 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-20px, -30px) scale(1.2); }
        }

        /* Page layout */
        .page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Card */
        .card {
            width: 100%;
            max-width: 420px;
            padding: 48px 44px 40px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            backdrop-filter: blur(28px) saturate(1.5);
            -webkit-backdrop-filter: blur(28px) saturate(1.5);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(255, 45, 149, 0.06),
                0 1px 0 rgba(255, 255, 255, 0.07) inset;
            text-align: center;
            position: relative;
            opacity: 0;
            transform: translateY(28px);
            animation: cardIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
        }

        /* Subtle top-edge accent line */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 40px;
            right: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--pink), var(--cyan), transparent);
            opacity: 0.5;
            border-radius: 1px;
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            width: 200px;
            max-width: 75%;
            margin: 0 auto 10px;
            display: block;
            opacity: 0.95;
            filter: drop-shadow(0 0 20px rgba(255, 45, 149, 0.2));
        }

        /* Station name */
        .station-name {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        /* Tagline */
        .tagline {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* Play button */
        .play-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 36px;
        }

        .play-ring {
            position: absolute;
            width: 112px;
            height: 112px;
            border-radius: 50%;
            border: 1.5px solid var(--pink-dim);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .play-wrap.playing .play-ring {
            opacity: 1;
            animation: ringPulse 2s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; border-color: var(--pink-dim); }
            50% { transform: scale(1.18); opacity: 0; border-color: var(--cyan-dim); }
        }

        .play-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--pink);
            background: rgba(255, 45, 149, 0.08);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
            -webkit-tap-highlight-color: transparent;
        }

        .play-btn:hover {
            transform: scale(1.08);
            background: rgba(255, 45, 149, 0.15);
            box-shadow: 0 0 35px rgba(255, 45, 149, 0.3), 0 0 80px rgba(255, 45, 149, 0.1);
            border-color: var(--pink-light);
        }

        .play-btn:active {
            transform: scale(0.96);
        }

        .play-btn svg {
            width: 30px;
            height: 30px;
            fill: var(--pink);
            transition: all 0.25s ease;
        }

        .play-btn:hover svg {
            fill: var(--pink-light);
        }

        .play-btn .icon-play {
            margin-left: 4px;
        }

        .play-btn .icon-pause {
            display: none;
        }

        .play-wrap.playing .play-btn {
            border-color: var(--pink);
            background: rgba(255, 45, 149, 0.12);
            box-shadow: 0 0 30px rgba(255, 45, 149, 0.15);
        }

        .play-wrap.playing .play-btn .icon-play { display: none; }
        .play-wrap.playing .play-btn .icon-pause { display: block; }

        /* Volume control */
        .volume-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding: 0 8px;
        }

        .volume-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0.55;
            transition: opacity 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .volume-icon:hover {
            opacity: 0.85;
        }

        .volume-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--text-primary);
        }

        /* Custom range slider */
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--pink);
            border: none;
            box-shadow: 0 0 10px rgba(255, 45, 149, 0.4);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
            box-shadow: 0 0 18px rgba(255, 45, 149, 0.55);
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--pink);
            border: none;
            box-shadow: 0 0 10px rgba(255, 45, 149, 0.4);
            cursor: pointer;
        }

        .volume-slider::-moz-range-track {
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Status */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 22px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.3s ease;
        }

        .status.live .status-dot {
            background: var(--pink);
            box-shadow: 0 0 8px rgba(255, 45, 149, 0.5);
            animation: dotPulse 1.6s ease-in-out infinite;
        }

        .status.connecting .status-dot {
            background: var(--cyan);
            animation: dotPulse 0.8s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        /* Equalizer */
        .eq {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 16px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .eq.active {
            opacity: 1;
        }

        .eq-bar {
            width: 3px;
            border-radius: 1.5px;
            background: linear-gradient(to top, var(--pink), var(--cyan));
            transform-origin: bottom;
        }

        .eq.active .eq-bar { animation: eqBounce 1s ease-in-out infinite; }
        .eq.active .eq-bar:nth-child(1) { animation-duration: 0.8s; }
        .eq.active .eq-bar:nth-child(2) { animation-duration: 1.1s; animation-delay: 0.1s; }
        .eq.active .eq-bar:nth-child(3) { animation-duration: 0.9s; animation-delay: 0.2s; }
        .eq.active .eq-bar:nth-child(4) { animation-duration: 1.2s; animation-delay: 0.05s; }
        .eq.active .eq-bar:nth-child(5) { animation-duration: 0.7s; animation-delay: 0.15s; }

        @keyframes eqBounce {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 36px 28px 30px;
                border-radius: 22px;
            }

            .logo {
                width: 170px;
            }

            .play-btn {
                width: 82px;
                height: 82px;
            }

            .play-ring {
                width: 100px;
                height: 100px;
            }

            .tagline {
                margin-bottom: 32px;
            }

            .glow {
                filter: blur(80px);
                opacity: 0.2;
            }
        }

        @media (max-height: 600px) {
            .card {
                padding: 24px 28px 22px;
            }

            .tagline {
                margin-bottom: 24px;
            }

            .play-wrap {
                margin-bottom: 24px;
            }

            .volume-row {
                margin-bottom: 20px;
            }
        }

        /* Selection color */
        ::selection {
            background: var(--pink-dim);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="glow glow--pink"></div>
    <div class="glow glow--cyan"></div>
    <div class="glow glow--purple"></div>

    <main class="page">
        <div class="card">
            <!-- Logo -->
            <img class="logo" src="https://media.bauerradio.com/image/upload/c_crop,g_custom/v1661254114/brand_manager/stations/xkmxcp3ksdioty45idzj.png" alt="KISS">

            <!-- Branding -->
            <p class="station-name" id="stationName"></p>
            <p class="tagline" id="tagline"></p>

            <!-- Play/Pause -->
            <div class="play-wrap" id="playWrap">
                <div class="play-ring"></div>
                <button class="play-btn" id="playBtn" aria-label="Play">
                    <svg class="icon-play" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
                    <svg class="icon-pause" viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
                </button>
            </div>

            <!-- Volume -->
            <div class="volume-row">
                <div class="volume-icon" id="muteToggle" role="button" aria-label="Toggle mute">
                    <svg id="volIcon" viewBox="0 0 24 24">
                        <path id="volPath" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </div>
                <input class="volume-slider" id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.7" aria-label="Volume">
            </div>

            <!-- Status -->
            <div class="status" id="status">
                <div class="eq" id="eq">
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                </div>
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">READY TO PLAY</span>
            </div>
        </div>
    </main>

    <script>
        // ============================================
        // CONFIGURE YOUR STREAM URL HERE
        // ============================================
        const STREAM_URL = 'https://firebasestorage.googleapis.com/v0/b/podcastsite-1bedc.appspot.com/o/kissDANCE.aac?alt=media&token=079039a9-b8cb-451b-bed6-7611a4d06bde';
        const STATION_NAME = 'KISS';
        const STATION_TAGLINE = 'NON STOP DANCE';

        // ============================================
        // DOM
        // ============================================
        const playWrap   = document.getElementById('playWrap');
        const playBtn    = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const muteToggle = document.getElementById('muteToggle');
        const volPath    = document.getElementById('volPath');
        const statusEl   = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const eq         = document.getElementById('eq');

        // Populate branding
        document.getElementById('stationName').textContent = STATION_NAME;
        document.getElementById('tagline').textContent = STATION_TAGLINE;
        document.title = STATION_NAME;

        // ============================================
        // AUDIO
        // ============================================
        let audio = null;
        let isPlaying = false;
        let isMuted = false;
        let savedVolume = 0.7;

        // Volume icon SVG paths
        const VOL_HIGH = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
        const VOL_LOW  = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z';
        const VOL_MUTE = 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4l-1.88 1.88L12 7.76V4z';

        function createAudio() {
            if (audio) {
                audio.pause();
                audio.removeAttribute('src');
                audio.load();
            }
            audio = new Audio();
            audio.crossOrigin = 'anonymous';
            audio.volume = isMuted ? 0 : parseFloat(volumeSlider.value);
            audio.loop = true;
            audio.src = STREAM_URL;

            audio.addEventListener('waiting', () => setStatus('connecting'));
            audio.addEventListener('playing', () => setStatus('live'));
            audio.addEventListener('pause', () => { if (!isPlaying) setStatus('ready'); });
            audio.addEventListener('error', () => {
                setStatus('ready');
                isPlaying = false;
                playWrap.classList.remove('playing');
            });
        }

        function togglePlay() {
            if (!isPlaying) {
                createAudio();
                setStatus('connecting');

                const onReady = () => {
                    if (audio.duration && isFinite(audio.duration)) {
                        audio.currentTime = Math.random() * audio.duration;
                    }
                    audio.play().then(() => {
                        isPlaying = true;
                        playWrap.classList.add('playing');
                    }).catch(() => {
                        setStatus('ready');
                    });
                };

                if (audio.readyState >= 1 && isFinite(audio.duration)) {
                    onReady();
                } else {
                    audio.addEventListener('loadedmetadata', onReady, { once: true });
                }
            } else {
                audio.pause();
                isPlaying = false;
                playWrap.classList.remove('playing');
                setStatus('ready');
            }
        }

        function setStatus(state) {
            statusEl.className = 'status';
            eq.classList.remove('active');

            switch (state) {
                case 'live':
                    statusEl.classList.add('live');
                    statusText.textContent = 'NOW STREAMING';
                    eq.classList.add('active');
                    break;
                case 'connecting':
                    statusEl.classList.add('connecting');
                    statusText.textContent = 'CONNECTING';
                    break;
                default:
                    statusText.textContent = 'READY TO PLAY';
            }
        }

        // Volume
        function updateVolume(val) {
            if (audio) audio.volume = val;
            updateVolumeIcon(val);
            updateSliderFill(val);
        }

        function updateVolumeIcon(val) {
            if (val === 0 || isMuted) {
                volPath.setAttribute('d', VOL_MUTE);
            } else if (val < 0.5) {
                volPath.setAttribute('d', VOL_LOW);
            } else {
                volPath.setAttribute('d', VOL_HIGH);
            }
        }

        function updateSliderFill(val) {
            const pct = val * 100;
            volumeSlider.style.background = `linear-gradient(to right, var(--pink) 0%, var(--pink) ${pct}%, rgba(255,255,255,0.1) ${pct}%, rgba(255,255,255,0.1) 100%)`;
        }

        function toggleMute() {
            if (isMuted) {
                isMuted = false;
                volumeSlider.value = savedVolume;
                updateVolume(savedVolume);
            } else {
                savedVolume = parseFloat(volumeSlider.value) || 0.7;
                isMuted = true;
                volumeSlider.value = 0;
                updateVolume(0);
            }
        }

        // ============================================
        // EVENTS
        // ============================================
        playBtn.addEventListener('click', togglePlay);
        muteToggle.addEventListener('click', toggleMute);

        volumeSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            isMuted = false;
            updateVolume(val);
        });

        // Init slider fill
        updateSliderFill(0.7);
        updateVolumeIcon(0.7);

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                togglePlay();
            }
        });
    </script>
</body>
</html>
